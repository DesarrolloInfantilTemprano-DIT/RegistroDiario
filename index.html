<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Atención Infantil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-top: 5px solid #2c3e50; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section-title { background: #e9ecef; padding: 10px; border-radius: 5px; font-weight: bold; color: #2c3e50; margin-bottom: 20px; }
        .btn-search { background-color: #2c3e50; color: white; transition: 0.3s; }
        .btn-search:hover { background-color: #34495e; color: white; }
        .form-label { font-weight: 500; font-size: 0.9rem; color: #555; }
        .age-display { font-size: 0.85rem; color: #0d6efd; font-weight: bold; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card p-4">
                <h3 class="text-center mb-4"><i class="fas fa-clipboard-list me-2"></i>Modelo de Registro de Atención</h3>
                
                <form id="registroForm">
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Consultar por DNI (Censo)</label>
                            <div class="input-group">
                                <input type="text" id="dni" class="form-control" placeholder="Ingrese DNI..." required>
                                <button type="button" class="btn btn-search" onclick="buscarCenso()"><i class="fas fa-search"></i></button>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Fecha de Atención (A)</label>
                            <input type="date" id="fechaAtencion" class="form-control" onchange="calcularEdad()" required>
                        </div>
                    </div>

                    <div class="section-title">Datos Personales (Censo)</div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-8">
                            <label class="form-label">Apellidos y Nombres (B)</label>
                            <input type="text" id="nombreCompleto" class="form-control bg-light" readonly>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Fecha de Nacimiento (D)</label>
                            <input type="date" id="fn" class="form-control bg-light" readonly onchange="calcularEdad()">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Sexo (E)</label>
                            <input type="text" id="sexo" class="form-control bg-light" readonly>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label">Edad (F)</label>
                            <input type="text" id="edad" class="form-control bg-info-subtle" readonly placeholder="Cálculo automático">
                        </div>
                    </div>

                    <div class="section-title">Datos Administrativos y Sectorización</div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label class="form-label">Historia Clínica (G)</label>
                            <input type="text" id="hc" class="form-control bg-light" readonly>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Ficha Familiar (H)</label>
                            <input type="text" id="fichaFamiliar" class="form-control bg-light" readonly>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Teléfono (I)</label>
                            <input type="text" id="telefono" class="form-control bg-light" readonly>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Sector (J)</label>
                            <input type="text" id="sector" class="form-control bg-light" readonly>
                        </div>
                    </div>

                    <div class="section-title">Evaluación Nutricional y Suplementación</div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-2"><label class="form-label">N° CRED (K)</label><input type="text" id="cred" class="form-control"></div>
                        <div class="col-md-2"><label class="form-label">Peso (L)</label><input type="text" id="peso" class="form-control"></div>
                        <div class="col-md-2"><label class="form-label">Talla (M)</label><input type="text" id="talla" class="form-control"></div>
                        <div class="col-md-2"><label class="form-label">IMC (N)</label><input type="text" id="imc" class="form-control"></div>
                        <div class="col-md-2"><label class="form-label">Hb (O)</label><input type="text" id="hb" class="form-control"></div>
                        <div class="col-md-2"><label class="form-label">Supl. Hierro (P)</label><input type="text" id="suplHierro" class="form-control"></div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <button type="submit" class="btn btn-primary btn-lg px-5">Guardar Registro <i class="fas fa-save ms-2"></i></button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const URL_CENSO = "https://script.google.com/macros/s/AKfycbyUZovmsNawKbd-Xym-MFbl0gJF_8wl6qj2MDGy-QL-IsJGnYZNPrR7_ezTwl5NsAgPbg/exec";
    const URL_REGISTRO = "https://script.google.com/macros/s/AKfycbx5u0YLVH37cOAgXkGfOOCNwkuCuOdn27BElO47HNHTOwzXNj2x8AZ1dQcmhr57aoNz/exec";

    function buscarCenso() {
        let dni = document.getElementById('dni').value;
        if(!dni) return Swal.fire("Atención", "Ingrese un DNI", "warning");

        fetch(`${URL_CENSO}?dni=${dni}`)
            .then(res => res.json())
            .then(data => {
                if (data.status === "error") {
                    Swal.fire("No encontrado", "Debe ingresar sus datos al módulo Censo", "error");
                    document.getElementById('registroForm').reset();
                } else {
                    document.getElementById('nombreCompleto').value = data.nombres;
                    document.getElementById('fn').value = data.fn; // Formato YYYY-MM-DD
                    document.getElementById('sexo').value = data.sexo;
                    document.getElementById('hc').value = data.hc;
                    document.getElementById('fichaFamiliar').value = data.ficha;
                    document.getElementById('telefono').value = data.telefono;
                    document.getElementById('sector').value = data.sector;
                    calcularEdad();
                }
            });
    }

    function calcularEdad() {
        let fAtencion = new Date(document.getElementById('fechaAtencion').value);
        let fNacimiento = new Date(document.getElementById('fn').value);

        if (!fAtencion || !fNacimiento || isNaN(fAtencion) || isNaN(fNacimiento)) return;

        let anos = fAtencion.getFullYear() - fNacimiento.getFullYear();
        let meses = fAtencion.getMonth() - fNacimiento.getMonth();
        let dias = fAtencion.getDate() - fNacimiento.getDate();

        if (dias < 0) {
            meses--;
            dias += new Date(fAtencion.getFullYear(), fAtencion.getMonth(), 0).getDate();
        }
        if (meses < 0) {
            anos--;
            meses += 12;
        }
        document.getElementById('edad').value = `${anos} años, ${meses} meses, ${dias} días`;
    }

    // Lógica para enviar datos a la hoja de Registro (URL Registro)
    document.getElementById('registroForm').onsubmit = function(e) {
        e.preventDefault();
        // Aquí se enviaría el objeto con todas las columnas A-Z
        Swal.fire("Éxito", "Datos enviados a la hoja Registro", "success");
    };
</script>
</body>
</html>
