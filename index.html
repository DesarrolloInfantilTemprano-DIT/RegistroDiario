<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Atención Infantil - SIGIS_FED</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-top: 5px solid #2c3e50; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section-title { background: #e9ecef; padding: 10px; border-radius: 5px; font-weight: bold; color: #2c3e50; margin-bottom: 20px; }
        .btn-search { background-color: #2c3e50; color: white; transition: 0.3s; }
        .btn-search:hover { background-color: #34495e; color: white; }
        .form-label { font-weight: 500; font-size: 0.9rem; color: #555; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-11">
            <div class="card p-4">
                <h3 class="text-center mb-4"><i class="fas fa-clipboard-list me-2"></i>Modelo de Registro de Atención</h3>
                
                <form id="registroForm">
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Consultar por DNI (Censo)</label>
                            <div class="input-group">
                                <input type="text" id="dni" class="form-control" placeholder="Ingrese DNI..." required>
                                <button type="button" class="btn btn-search" onclick="buscarCenso()"><i class="fas fa-search"></i></button>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Fecha de Atención (A)</label>
                            <input type="date" id="fechaAtencion" class="form-control" onchange="actualizarFechas()" required>
                        </div>
                    </div>

                    <div class="section-title">Datos Personales (Censo)</div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-8">
                            <label class="form-label">Apellidos y Nombres (B)</label>
                            <input type="text" id="nombreCompleto" class="form-control bg-light" readonly>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Fecha de Nacimiento (D)</label>
                            <input type="date" id="fn" class="form-control bg-light" readonly onchange="calcularEdad()">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Sexo (E)</label>
                            <input type="text" id="sexo" class="form-control bg-light" readonly>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label">Edad (F)</label>
                            <input type="text" id="edad" class="form-control bg-info-subtle" readonly placeholder="Cálculo automático">
                        </div>
                    </div>

                    <div class="section-title">Datos Administrativos y Sectorización</div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label class="form-label">Historia Clínica (G)</label>
                            <input type="text" id="hc" class="form-control bg-light" readonly>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Ficha Familiar (H)</label>
                            <input type="text" id="fichaFamiliar" class="form-control bg-light" readonly>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Teléfono (I)</label>
                            <input type="text" id="telefono" class="form-control bg-light" readonly>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Sector (J)</label>
                            <input type="text" id="sector" class="form-control bg-light" readonly>
                        </div>
                    </div>

                    <div class="section-title">Evaluación Nutricional y Suplementación</div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-2"><label class="form-label">N° CRED (K)</label><input type="text" id="cred" class="form-control"></div>
                        <div class="col-md-2"><label class="form-label">Peso (L)</label><input type="text" id="peso" class="form-control"></div>
                        <div class="col-md-2"><label class="form-label">Talla (M)</label><input type="text" id="talla" class="form-control"></div>
                        <div class="col-md-2"><label class="form-label">IMC (N)</label><input type="text" id="imc" class="form-control"></div>
                        <div class="col-md-2"><label class="form-label">Hb (O)</label><input type="text" id="hb" class="form-control"></div>
                        <div class="col-md-2">
                            <label class="form-label">Supl. Hierro (P)</label>
                            <select id="suplHierro" class="form-select">
                                <option value="">Seleccione...</option>
                                <option>Sulfato Ferroso en gotas</option>
                                <option>Hierro Polimaltosado en gotas</option>
                                <option>Sulfato Ferroso en jarabe</option>
                                <option>Hierro Polimaltosado en jarabe</option>
                                <option>Mutimicronutrientes 1 g (sobres)</option>
                            </select>
                        </div>
                    </div>

                    <div class="section-title">Tratamiento, Vacunas y Citas</div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-2"><label class="form-label">N° Unid. Hierro</label><input type="number" id="unidadesHierro" class="form-control"></div>
                        <div class="col-md-2">
                            <label class="form-label">Motivo Hierro</label>
                            <select id="motivoHierro" class="form-select">
                                <option>Preventivo</option>
                                <option>Tratamiento</option>
                            </select>
                        </div>
                        <div class="col-md-2"><label class="form-label">N° Mes Hierro</label><input type="number" id="mesHierro" class="form-control" min="1" max="7"></div>
                        <div class="col-md-4">
                            <label class="form-label">Antiparasitario</label>
                            <select id="antiparasitario" class="form-select">
                                <option value="">Ninguno</option>
                                <option>Albendazol en Jarabe</option>
                                <option>Mebendazol en Jarabe</option>
                                <option>Albendazol en Tableta</option>
                                <option>Mebendazol en Tableta</option>
                            </select>
                        </div>
                        <div class="col-md-2"><label class="form-label">Unid. Antip.</label><input type="number" id="unidadesAntip" class="form-control"></div>
                        <div class="col-md-3">
                            <label class="form-label">N° Vitamina A</label>
                            <select id="vitaminaA" class="form-select">
                                <option value="">Seleccione...</option>
                                <option>100000 UI</option>
                                <option>200000 UI</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Vacunado</label>
                            <select id="vacunado" class="form-select">
                                <option value="No">No</option>
                                <option value="Si">Si</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Fecha Cita</label>
                            <input type="date" id="fechaCita" class="form-control">
                        </div>
                    </div>

                    <div class="section-title">Responsables de Atención</div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Esp. Infantil (Buscador)</label>
                            <input type="text" id="espInfantil" class="form-control" list="listEsp" placeholder="Escriba para buscar...">
                            <datalist id="listEsp"></datalist>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Asist. Especialidad (Buscador)</label>
                            <input type="text" id="asistEspecialidad" class="form-control" list="listAsist" placeholder="Escriba para buscar...">
                            <datalist id="listAsist"></datalist>
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <button type="submit" id="btnGuardar" class="btn btn-primary btn-lg px-5">Guardar Registro <i class="fas fa-save ms-2"></i></button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const URL_CENSO = "https://script.google.com/macros/s/AKfycbwkYPuO13juZBjhs7wrxX0MEYy-hPeg0HyzjDJ9_Oy-Yq3Fih99wFAyI5xlbJ_u4rBX1g/exec";
    const URL_REGISTRO = "https://script.google.com/macros/s/AKfycbwUK1-DxYxeZcm11KEU-bKLmAsz2GG_xlnpMfm1jQaNzV6x84ey712aQzPM_Lgml1Gk/exec";

    // Inicialización al cargar la página
    window.onload = function() {
        const hoy = new Date().toISOString().split('T')[0];
        document.getElementById('fechaAtencion').value = hoy;
        actualizarFechas(); // Calcula cita +30 automáticamente
        cargarListasExcel();
    };

    function actualizarFechas() {
        const fAtencion = document.getElementById('fechaAtencion').value;
        if (fAtencion) {
            let fecha = new Date(fAtencion + "T00:00:00");
            fecha.setDate(fecha.getDate() + 30);
            document.getElementById('fechaCita').value = fecha.toISOString().split('T')[0];
            calcularEdad();
        }
    }

    function cargarListasExcel() {
        fetch(`${URL_REGISTRO}?getLists=true`)
            .then(res => res.json())
            .then(data => {
                const dlEsp = document.getElementById('listEsp');
                const dlAsist = document.getElementById('listAsist');
                data.especialistas.forEach(item => { if(item) dlEsp.innerHTML += `<option value="${item}">`; });
                data.asistentes.forEach(item => { if(item) dlAsist.innerHTML += `<option value="${item}">`; });
            })
            .catch(err => console.error("Error cargando listas:", err));
    }

    function buscarCenso() {
        let dni = document.getElementById('dni').value;
        if(!dni) return Swal.fire("Atención", "Ingrese un DNI", "warning");

        Swal.fire({ title: 'Buscando...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

        fetch(`${URL_CENSO}?dni=${dni}`)
            .then(res => res.json())
            .then(data => {
                Swal.close();
                if (data.status === "error" || !data.nombreB) {
                    Swal.fire("No encontrado", "DNI no existe en Censo", "error");
                } else {
                    document.getElementById('nombreCompleto').value = data.nombreB;
                    document.getElementById('sexo').value = data.sexo;
                    document.getElementById('hc').value = data.hclinica;
                    document.getElementById('fichaFamiliar').value = data.ffamiliar;
                    document.getElementById('telefono').value = data.telefono;
                    document.getElementById('sector').value = data.sector;

                    if (data.fn && data.fn.includes('/')) {
                        let partes = data.fn.split('/');
                        document.getElementById('fn').value = `${partes[2]}-${partes[1]}-${partes[0]}`;
                    } else {
                        document.getElementById('fn').value = data.fn;
                    }
                    calcularEdad();
                }
            })
            .catch(() => Swal.fire("Error", "Fallo al conectar con Censo", "error"));
    }

    function calcularEdad() {
        let valAtencion = document.getElementById('fechaAtencion').value;
        let valNacimiento = document.getElementById('fn').value;
        if (!valAtencion || !valNacimiento) return;

        let fAt = new Date(valAtencion + "T00:00:00");
        let fNa = new Date(valNacimiento + "T00:00:00");

        let anos = fAt.getFullYear() - fNa.getFullYear();
        let meses = fAt.getMonth() - fNa.getMonth();
        let dias = fAt.getDate() - fNa.getDate();

        if (dias < 0) { meses--; dias += new Date(fAt.getFullYear(), fAt.getMonth(), 0).getDate(); }
        if (meses < 0) { anos--; meses += 12; }
        document.getElementById('edad').value = `${anos} años, ${meses} meses, ${dias} días`;
    }

    document.getElementById('registroForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnGuardar');
        btn.disabled = true;
        btn.innerHTML = "Enviando... <i class='fas fa-spinner fa-spin ms-2'></i>";

        const datos = {
            fechaAtencion: document.getElementById('fechaAtencion').value,
            nombreCompleto: document.getElementById('nombreCompleto').value,
            dni: document.getElementById('dni').value,
            fn: document.getElementById('fn').value,
            sexo: document.getElementById('sexo').value,
            edad: document.getElementById('edad').value,
            hc: document.getElementById('hc').value,
            ficha: document.getElementById('fichaFamiliar').value,
            telefono: document.getElementById('telefono').value,
            sector: document.getElementById('sector').value,
            cred: document.getElementById('cred').value,
            peso: document.getElementById('peso').value,
            talla: document.getElementById('talla').value,
            imc: document.getElementById('imc').value,
            hb: document.getElementById('hb').value,
            suplHierro: document.getElementById('suplHierro').value,
            unidadesHierro: document.getElementById('unidadesHierro').value,
            motivoHierro: document.getElementById('motivoHierro').value,
            mesHierro: document.getElementById('mesHierro').value,
            antiparasitario: document.getElementById('antiparasitario').value,
            unidadesAntip: document.getElementById('unidadesAntip').value,
            vitaminaA: document.getElementById('vitaminaA').value,
            vacunado: document.getElementById('vacunado').value,
            fechaCita: document.getElementById('fechaCita').value,
            espInfantil: document.getElementById('espInfantil').value,
            asistEspecialidad: document.getElementById('asistEspecialidad').value
        };

        const params = new URLSearchParams(datos).toString();

        fetch(`${URL_REGISTRO}?${params}`, { method: 'GET', mode: 'no-cors' })
            .then(() => {
                Swal.fire("Éxito", "Registro guardado correctamente", "success");
                document.getElementById('registroForm').reset();
                window.onload(); // Reinicia fechas por defecto
            })
            .catch(() => Swal.fire("Error", "No se pudo guardar", "error"))
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = "Guardar Registro <i class='fas fa-save ms-2'></i>";
            });
    };
</script>
</body>
</html>
